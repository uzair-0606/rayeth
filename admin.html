<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Rayeth Studio</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Rayeth Studio home">
      <img src="assets/logo/rayeth-mark.svg" alt="" class="brand-mark">
      <span>RAYETH</span>
    </a>
    <nav class="header-nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="appointments.html">Appointments</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="admin-page">
    <section class="login-card" id="login-card" aria-labelledby="login-title">
      <p class="eyebrow">Protected access</p>
      <h1 id="login-title">Admin Login</h1>
      <form id="admin-login-form">
        <label>
          <span>Admin Email</span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button" type="submit">Login</button>
        <p class="admin-message" id="login-message" role="status" aria-live="polite"></p>
      </form>
    </section>

    <div class="admin-content" id="admin-content" hidden>
    <section class="admin-hero" aria-labelledby="admin-title">
      <div>
        <p class="eyebrow">Admin desk</p>
        <h1 id="admin-title">Appointments</h1>
        <p>View saved bookings, cancel appointments, remove records, clear the list, or add a physical appointment manually.</p>
      </div>
      <div class="admin-actions-top">
        <button class="secondary-button" id="logout-button" type="button">Logout</button>
        <button class="danger-button" id="clear-bookings" type="button">Clear All</button>
      </div>
    </section>

    <section class="admin-layout">
      <form class="admin-card" id="manual-booking-form">
        <h2>Add Appointment</h2>
        <div class="form-grid">
          <label>
            <span>Full Name</span>
            <input type="text" name="name" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" required>
          </label>
          <label>
            <span>Phone</span>
            <input type="tel" name="phone" placeholder="+91 98765 43210" pattern="^(\\+91[\\s-]?|91[\\s-]?|0)?[6-9][0-9]{9}$" title="Enter a valid Indian phone number, for example +91 9876543210" required>
          </label>
          <label>
            <span>Service</span>
            <select name="service" required>
              <option value="">Select service</option>
              <option>Haircut</option>
              <option>Hair Colour</option>
              <option>Spa</option>
              <option>Tattoo</option>
            </select>
          </label>
          <label>
            <span>Date</span>
            <input type="date" name="date" required>
          </label>
          <label>
            <span>Time</span>
            <select name="time" required>
              <option value="">Select time</option>
              <option>08:00 AM</option>
              <option>08:30 AM</option>
              <option>09:00 AM</option>
              <option>09:30 AM</option>
              <option>10:00 AM</option>
              <option>10:30 AM</option>
              <option>11:00 AM</option>
              <option>11:30 AM</option>
              <option>12:00 PM</option>
              <option>12:30 PM</option>
              <option>01:00 PM</option>
              <option>01:30 PM</option>
              <option>02:00 PM</option>
              <option>02:30 PM</option>
              <option>03:00 PM</option>
              <option>03:30 PM</option>
              <option>04:00 PM</option>
              <option>04:30 PM</option>
              <option>05:00 PM</option>
              <option>05:30 PM</option>
              <option>06:00 PM</option>
              <option>06:30 PM</option>
              <option>07:00 PM</option>
              <option>07:30 PM</option>
              <option>08:00 PM</option>
              <option>08:30 PM</option>
              <option>09:00 PM</option>
              <option>09:30 PM</option>
              <option>10:00 PM</option>
            </select>
          </label>
        </div>
        <button class="primary-button" type="submit">Add Appointment</button>
        <p class="admin-message" id="admin-message" role="status" aria-live="polite"></p>
      </form>

      <section class="admin-card bookings-card" aria-label="Saved appointments">
        <div class="bookings-head">
          <h2>Saved Appointments</h2>
          <button class="secondary-button" id="refresh-bookings" type="button">Refresh</button>
        </div>
        <div class="bookings-list" id="bookings-list"></div>
      </section>
    </section>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
